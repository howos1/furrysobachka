<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link type="image/png" sizes="512x511" rel="icon" href="https://meow.furrysobachka.ru/img/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style-gallery.css">
  <script src="https://meow.furrysobachka.ru/osu-cursor/dist/index.cjs.js"></script>
  <meta name="description" content="About furry uwu nyawka, with nickname howosy">
  <title>YukiMeow Arts</title>
</head>
<body>
  <div class="container">
    <h1>YukiMeow Arts :3</h1>
    <div class="gallery" id="gallery"></div>
    <div class="loading" id="loading">Загрузка...</div>
  </div>

  <div class="fullscreen-overlay" id="fullscreenOverlay">
    <button class="close-button" id="closeButton">
      <i class="fas fa-times"></i>
    </button>
    
    <button class="nav-button prev-button" id="prevButton">
      <i class="fas fa-chevron-left"></i>
    </button>
    <button class="nav-button next-button" id="nextButton">
      <i class="fas fa-chevron-right"></i>
    </button>

    <img class="fullscreen-image" id="fullscreenImage" src="" alt="">
    <div class="fullscreen-author-container" id="fullscreenAuthorContainer">
      <div class="fullscreen-author" id="fullscreenAuthor"></div>
      <div class="fullscreen-femboy" id="fullscreenFemboy">(Femboy Version)</div>
    </div>
  </div>

  <a href="/" class="back-button">
    <i class="fas fa-arrow-left"></i> Назад
  </a>

  <script>
    let allImages = [];
    let loadedCount = 0;
    const batchSize = 9;
    let isLoading = false;
    let currentFullscreenIndex = 0;

    async function loadGallery() {
      try {
        const response = await fetch("https://meow.furrysobachka.ru/dist/yukimeow.json");
        allImages = await response.json();
        
        loadNextBatch();
        
        window.addEventListener('scroll', handleScroll);
        
      } catch (err) {
        console.error("Ошибка загрузки галереи:", err);
        document.getElementById("gallery").innerHTML = "<p>Не удалось загрузить рисунки :(</p>";
        document.getElementById("loading").style.display = 'none';
      }
    }

    function handleScroll() {
      if (isLoading) return;
      
      const scrollTop = window.scrollY || document.documentElement.scrollTop;
      const windowHeight = window.innerHeight;
      const documentHeight = document.documentElement.scrollHeight;
      
      if (scrollTop + windowHeight >= documentHeight - windowHeight * 0.2) {
        loadNextBatch();
      }
    }

    function loadNextBatch() {
      if (loadedCount >= allImages.length) {
        document.getElementById("loading").style.display = 'none';
        window.removeEventListener('scroll', handleScroll);
        return;
      }

      isLoading = true;
      const gallery = document.getElementById("gallery");
      const loadingElement = document.getElementById("loading");
      
      const nextBatch = allImages.slice(loadedCount, loadedCount + batchSize);
      const currentBatchStart = loadedCount;
      
      nextBatch.forEach((item, index) => {
        const absoluteIndex = currentBatchStart + index;

        setTimeout(() => {
          const div = document.createElement("div");
          div.className = "gallery-item";
          div.style.animationDelay = `${index * 0.1}s`;

          const wrapper = document.createElement("div");
          wrapper.className = "image-wrapper";

          const img = document.createElement("img");
          img.src = item.url;
          img.alt = `Рисунок от ${item.author}`;
          img.loading = "lazy";
          
          if (item.blur) {
            img.classList.add("blur-on-hover");
          }

          img.addEventListener("click", () => {
            openFullscreen(absoluteIndex);
          });

          const overlay = document.createElement("div");
          overlay.className = "author-overlay";
          overlay.textContent = `Автор: ${item.author}`;

          wrapper.appendChild(img);
          wrapper.appendChild(overlay);
          div.appendChild(wrapper);
          gallery.appendChild(div);
        }, index * 50);
      });

      loadedCount += nextBatch.length;
      
      if (loadedCount < allImages.length) {
        loadingElement.textContent = `Загружено ${loadedCount} из ${allImages.length} рисунков...`;
      } else {
        loadingElement.textContent = `Все рисунки загружены! (${allImages.length})`;
        setTimeout(() => {
          loadingElement.style.display = 'none';
        }, 2000);
      }
      
      isLoading = false;
    }

    const fullscreenOverlay = document.getElementById("fullscreenOverlay");
    const fullscreenImage = document.getElementById("fullscreenImage");
    const fullscreenAuthor = document.getElementById("fullscreenAuthor");
    const fullscreenFemboy = document.getElementById("fullscreenFemboy");
    const closeButton = document.getElementById("closeButton");
    const nextButton = document.getElementById("nextButton");
    const prevButton = document.getElementById("prevButton");

    function resetElementsOpacity() {
      const elements = [fullscreenImage, fullscreenAuthor, fullscreenFemboy];
      elements.forEach(el => {
        el.style.transition = '';
        el.classList.remove('fade-in');
        el.style.opacity = '';
      });
    }

    function openFullscreen(index, isSwitching = false) {
      currentFullscreenIndex = index;
      const item = allImages[index];

      const animatedElements = [fullscreenImage, fullscreenAuthor, fullscreenFemboy];

      if (isSwitching) {
        animatedElements.forEach(el => {
          el.style.transition = 'none';
          el.style.opacity = '0';
          el.classList.remove('fade-in');
        });
        
        fullscreenImage.src = item.url;
        fullscreenAuthor.textContent = `Автор: ${item.author}`;
        
        if (item.femboy) {
          fullscreenFemboy.style.display = 'block';
        } else {
          fullscreenFemboy.style.display = 'none';
        }

        requestAnimationFrame(() => {
          animatedElements.forEach(el => {
            el.style.transition = '';
            el.classList.add('fade-in');
          });
        });
      } 
      else {
        resetElementsOpacity();
        
        fullscreenImage.src = item.url;
        fullscreenAuthor.textContent = `Автор: ${item.author}`;
        
        if (item.femboy) {
          fullscreenFemboy.style.display = 'block';
        } else {
          fullscreenFemboy.style.display = 'none';
        }

        fullscreenOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
        
        setTimeout(() => {
          animatedElements.forEach(el => {
            el.classList.add('fade-in');
          });
        }, 50);
      }
    }

    function closeFullscreen() {
      const animatedElements = [fullscreenImage, fullscreenAuthor, fullscreenFemboy];
      animatedElements.forEach(el => {
        el.classList.remove('fade-in');
      });
      
      fullscreenOverlay.classList.add('closing');
      setTimeout(() => {
        fullscreenOverlay.classList.remove('active', 'closing');
        document.body.style.overflow = 'auto';
        animatedElements.forEach(el => {
          el.style.opacity = '';
        });
      }, 400);
    }

    function showNextImage(e) {
      if (e) e.stopPropagation();
      let nextIndex = currentFullscreenIndex + 1;
      if (nextIndex >= allImages.length) {
        nextIndex = 0;
      }
      openFullscreen(nextIndex, true);
    }

    function showPrevImage(e) {
      if (e) e.stopPropagation();
      let prevIndex = currentFullscreenIndex - 1;
      if (prevIndex < 0) {
        prevIndex = allImages.length - 1;
      }
      openFullscreen(prevIndex, true);
    }

    closeButton.addEventListener("click", closeFullscreen);
    nextButton.addEventListener("click", showNextImage);
    prevButton.addEventListener("click", showPrevImage);

    fullscreenOverlay.addEventListener("click", (e) => {
      if (e.target === fullscreenOverlay) {
        closeFullscreen();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (!fullscreenOverlay.classList.contains('active')) return;

      if (e.key === 'Escape') {
        closeFullscreen();
      } else if (e.key === 'ArrowRight') {
        showNextImage();
      } else if (e.key === 'ArrowLeft') {
        showPrevImage();
      }
    });

    loadGallery();
  </script>

<style>
  * {
      cursor: none !important;
  }
  .osu-cursor {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
  }

  @media (hover: none), (pointer: coarse) {
    * {
      cursor: none !important;
    }
    .osu-cursor {
      display: none !important;
    }
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const cursor = new osuCursor({
      rotate: true,
      size: 1.0
    });
  });
</script>
</body>
</html>
